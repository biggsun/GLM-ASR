services:
  glm-asr:
    build: .
    container_name: glm-asr
    ports:
      - "9930:9930"
    environment:
      - MODEL_SOURCE=huggingface
      - MODEL_NAME=glm-asr
      - HOST=0.0.0.0
      - PORT=9930
      - HF_MODEL_ID=zai-org/GLM-ASR-Nano-2512
      - MS_MODEL_ID=ZhipuAI/GLM-ASR-Nano-2512
    volumes:
      - model-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  model-cache:
